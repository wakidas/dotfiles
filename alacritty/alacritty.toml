[font]
  size   = 12
  normal.family = "Hack Nerd Font"

[window]
  opacity = 0.85

  padding.x = 10
  padding.y = 10

  decorations = "Full"
  option_as_alt = "Both"

[env]
TERM = "xterm-256color"

[general]
# https://github.com/alacritty/alacritty-theme
import = [
    "~/.config/alacritty/themes/themes/vesper.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\n"
