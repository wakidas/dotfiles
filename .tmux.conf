# prefix key
unbind-key C-b
set -g prefix C-g
bind C-g send-prefix

# common
set -s escape-time 0            # ESCキーの遅延をなくす
set -g mouse on                 # クリックでペイン切替・リサイズ
set -g history-limit 10000      # スクロールバック増量
set -g default-terminal "screen-256color"  # 256 色
setw -g mode-keys vi            # コピーモードでvimキーバインド

# コピーモード開始時のカーソル位置設定
bind [ copy-mode \; send -X goto-line -e
# set -g utf8 on
bind r source-file ~/.tmux.conf \; display "Reloaded!"  # <Prefix> r で再読込

# window番号の自動振り直し設定
set -g renumber-windows on # windowが削除・追加されたら自動的に番号を振り直す

# prefix + . でウィンドウ番号を直接指定して入れ替え
bind . command-prompt -p "Swap window to:" "swap-window -t '%%'"

# prefix + s で水平分割（Vim style）
bind s split-window -v -c "#{pane_current_path}"
# prefix + v で垂直分割（Vim style）
bind v split-window -h -c "#{pane_current_path}"

# 方向キーでのペイン移動（Vimライク）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（Shift + h/j/k/l）
set -g repeat-time 3000 # 再度プレフィックス入力すればリセット
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# アクティブなペインのみ白っぽく変更（真っ黒は232）
set -g window-style 'bg=colour240'
set -g window-active-style 'bg=colour232'

# ステータスバー
set -g status  on
set -g status-interval 3
set -g status-position top
set -g status-style  bg=default,fg=#FFFFFF

## 左：現在のウィンドウ名
set -g status-left-length 40
set -g status-left '[#S] '

## 右：日付＋時刻
set -g status-right-length 60
# set -g status-right '#[fg=colour24,bg=colour28]#[fg=colour231,bg=colour28] %Y-%m-%d %H:%M '
set -g status-right ''

## ウィンドウリスト
setw -g window-status-format        '#[fg=#FFFFFF,bg=#5c6d74] #I:#W '
setw -g window-status-current-format '#[fg=#FFFFFF,bg=#458588] #I:#W '

## 更新頻度
set -g status-interval 60

# <Prefix> q でペイン番号を 1500 ms 表示
set -g display-panes-time 1500
set -g display-panes-colour colour238
set -g display-panes-active-colour colour45

# kill-pane/kill-window の確認をEnterで承認できるように変更
bind x command-prompt -p "kill-pane #P? [Enter/n]" "if-shell '[ \"%%\" != \"n\" ]' 'kill-pane'"
bind & command-prompt -p "kill-window #W? [Enter/n]" "if-shell '[ \"%%\" != \"n\" ]' 'kill-window'"

# フォーカスイベントを有効化（Neovimなどのアプリケーションで自動リロードを機能させるため）
set -g focus-events on

# ペイン切り替え時にペイン番号を表示 + 入力メソッドを英数に切り替え
set-hook -g after-select-window 'run-shell "im-select com.apple.keylayout.ABC"'
set-hook -g after-select-pane 'run-shell "tmux display-panes; im-select com.apple.keylayout.ABC"'
#unbind-key -n DoubleClick1Pane

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# セッション保存・復元
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 自動保存・復元を有効化
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

# resurrectの設定
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# TPMを初期化（この行は最後に記述）
run '~/.tmux/plugins/tpm/tpm'
